<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус черги в їдальні</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; font-weight: 300; }
        .card {
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .status-bar {
            height: 40px;
            border-radius: 12px;
            background: #333;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
        }
        .fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease, background 0.5s ease;
            border-radius: 12px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 1.2rem;
        }
        .level-text {
            font-size: 2rem;
            margin-top: 15px;
            font-weight: bold;
        }
        .connecting {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        .analytics-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #0f3460;
            color: #4ecca3;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .analytics-link:hover {
            background: #1a1a2e;
        }
    </style>
</head>
<body>
    <h1>🍽 Статус черги в їдальні</h1>
    <div class="card">
        <div class="status-bar">
            <div class="fill" id="fill"></div>
        </div>
        <div class="level-text" id="level">—</div>
        <div class="info">
            <span>👥 <span id="people">0</span></span>
            <span>📊 <span id="percent">0</span>%</span>
        </div>
        <div class="connecting" id="status">Підключення...</div>
        <a href="/analytics" class="analytics-link">📈 Аналітика</a>
    </div>

    <script>
        const fill = document.getElementById('fill');
        const levelText = document.getElementById('level');
        const peopleSpan = document.getElementById('people');
        const percentSpan = document.getElementById('percent');
        const statusText = document.getElementById('status');

        function updateDashboard(data) {
            const { people, max, level, percent } = data;

            peopleSpan.textContent = people;
            percentSpan.textContent = percent;
            fill.style.width = percent + '%';

            if (level === 'free') {
                fill.style.background = '#4ecca3';
                levelText.textContent = '🟢 Вільно';
                levelText.style.color = '#4ecca3';
            } else if (level === 'busy') {
                fill.style.background = '#3498db';
                levelText.textContent = '🔵 Середня черга';
                levelText.style.color = '#3498db';
            } else {
                fill.style.background = '#e74c3c';
                levelText.textContent = '🔴 Черга повна';
                levelText.style.color = '#e74c3c';
            }
        }

        // Спробуємо WebSocket
        const wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws';
        let ws = null;
        let usePolling = false;

        function connectWS() {
            try {
                ws = new WebSocket(wsUrl);
                ws.onopen = () => {
                    statusText.textContent = 'Підключено';
                    statusText.style.color = '#4ecca3';
                    usePolling = false;
                };
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    updateDashboard(data);
                };
                ws.onclose = () => {
                    if (!usePolling) {
                        statusText.textContent = 'Втрачено';
                        statusText.style.color = '#e74c3c';
                        usePolling = true;
                        startPolling();
                    }
                };
                ws.onerror = () => {
                    usePolling = true;
                    startPolling();
                };
            } catch (e) {
                usePolling = true;
                startPolling();
            }
        }

        // HTTP polling fallback
        async function fetchStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                updateDashboard({
                    people: data.people_in_roi,
                    max: data.max,
                    level: data.level,
                    percent: data.percent
                });
                statusText.textContent = 'Підключено';
                statusText.style.color = '#4ecca3';
            } catch (err) {
                statusText.textContent = 'Помилка зʼєднання...';
                statusText.style.color = '#e74c3c';
            }
        }

        function startPolling() {
            fetchStatus();
            setInterval(fetchStatus, 1000);
        }

        // Стартуємо
        connectWS();
        setTimeout(() => {
            if (usePolling) startPolling();
        }, 2000);
    </script>
</body>
</html>
